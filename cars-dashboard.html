<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Vehiculos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="module">
        import { protectRoute } from './js/authProtect.js';

        (async () => {
            await protectRoute();
        })();

    </script>

    <script type="module">
        import { loadCars, setupAddCarForm } from './js/loadCars.js';
        (async () => {
            await loadCars();
        })();

        setupAddCarForm();
    </script>

</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="#">🔧 Taller Mecánico</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <button class="btn btn-outline-warning btn-sm" data-bs-toggle="modal"
                            data-bs-target="#addCarModal">
                            + Agregar Vehículo
                        </button>
                    </li>
                </ul>

                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="menu.html">Volver</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html" id="logoutBtn">Cerrar Sesión</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <table class="table table-hover align-middle" id="carsTable">
        <thead class="table-dark">
            <tr>
                <th>Marca</th>
                <th>Modelo</th>
                <th>Año</th>
                <th>Placa</th>
            </tr>
        </thead>
        <tbody>

        </tbody>
    </table>


    <div class="modal fade" id="addCarModal" tabindex="-1" aria-labelledby="addCarModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addCarModalLabel">Agregar Nuevo Vehículo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="addCarForm">
                        <div class="mb-3">
                            <label class="form-label">Marca</label>
                            <input type="text" id="brand" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Modelo</label>
                            <input type="text" id="model" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Año</label>
                            <input type="number" id="year" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Placa</label>
                            <input type="text" id="plate" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Guardar Vehículo</button>
                    </form>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
